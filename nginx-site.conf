server {
    listen 80;
    server_name {your-server-ip};
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/xml
        font/opentype
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http://{your-server-ip};" always;

    # Block sensitive file types from being served (security hardening)
    # Prevents accidental exposure of database dumps, backups, configs, secrets
    # Note: .json/.xml/.yaml not blocked — frontend assets may need them
    location ~* \.(sql|bak|dump|backup|old|orig|save|swp|secret|key|pem|log|env|htaccess|htpasswd|tar|tgz|rar|7z|bz2)$ {
        return 404;
        access_log off;
    }

    # Block .git directory access (CVE-2026-xxx: Git目录暴露 — P0 安全漏洞)
    # Attackers probe /.git/HEAD, /.git/config etc. to download source code
    # Returns 403 instead of 404 to deter automated scanners
    location ~* ^/\.git {
        deny all;
        return 403;
        access_log off;
        log_not_found off;
    }

    # Block .env file access (CVE-2026-xxx: ENV配置文件暴露 — P0 安全漏洞)
    # Attackers probe /.env, /.env.local, /.env.production etc. to steal credentials
    # Returns 403 to deter automated scanners
    location ~* ^/\.env {
        deny all;
        return 403;
        access_log off;
        log_not_found off;
    }

    # Block config file access (CVE-2026-xxx: 配置文件暴露 — P0 安全漏洞)
    # Attackers probe /config.php, /config.yml, /application.yml etc.
    # Returns 403 to deter automated scanners
    location ~* ^/(config|application)\.(php|yml|yaml|json|xml|ini|conf)$ {
        deny all;
        return 403;
        access_log off;
        log_not_found off;
    }

    # Block SQL backup file access (CVE-2026-xxx: SQL备份暴露 — P0 安全漏洞)
    # Attackers probe /backup.sql, /dump.sql etc. to download database contents
    # Returns 403 to deter automated scanners
    location ~* \.sql$ {
        deny all;
        return 403;
        access_log off;
        log_not_found off;
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /favicon.ico {
        alias /usr/share/nginx/html/icons/icon-192.png;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location /downloads/ {
        alias /usr/share/nginx/html/downloads/;
        types { application/vnd.android.package-archive apk; }
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment';
        add_header Cache-Control "public, max-age=3600" always;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /icons/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* ^(?!/growth/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 1y;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Baby Growth Tracker - assets (must be before /growth/)
    location /growth/assets/ {
        proxy_pass http://localhost:3459/growth/assets/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Baby Growth Tracker
    location /growth/ {
        proxy_pass http://localhost:3459/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
