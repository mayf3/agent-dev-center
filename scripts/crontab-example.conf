# Agent任务轮询 Crontab配置示例
# 前期方案：凌晨执行（节省token成本）
# 后期优化：每小时执行（提高响应速度）

# ========================================
# 前期配置：凌晨2:00-4:00执行
# ========================================
# 每天凌晨2:00 - 后端工程师
0 2 * * * AGENT_TYPE=backend-engineer TOKEN=your-token-here API_BASE=http://localhost:3000/api {home}/workspace/project/agent-dev-center/scripts/poll-tasks.sh

# 每天凌晨2:15 - 前端工程师
15 2 * * * AGENT_TYPE=frontend-engineer TOKEN=your-token-here API_BASE=http://localhost:3000/api {home}/workspace/project/agent-dev-center/scripts/poll-tasks.sh

# 每天凌晨2:30 - 移动端工程师
30 2 * * * AGENT_TYPE=mobile-app-engineer TOKEN=your-token-here API_BASE=http://localhost:3000/api {home}/workspace/project/agent-dev-center/scripts/poll-tasks.sh

# 每天凌晨2:45 - 小程序工程师
45 2 * * * AGENT_TYPE=miniapp-game-engineer TOKEN=your-token-here API_BASE=http://localhost:3000/api {home}/workspace/project/agent-dev-center/scripts/poll-tasks.sh

# 每天凌晨3:00 - 游戏开发师
0 3 * * * AGENT_TYPE=game-dev-agent TOKEN=your-token-here API_BASE=http://localhost:3000/api {home}/workspace/project/agent-dev-center/scripts/poll-tasks.sh

# ========================================
# 后期配置：每小时执行
# ========================================
# 每小时的第0分钟 - 后端工程师
# 0 * * * * AGENT_TYPE=backend-engineer TOKEN=your-token-here API_BASE=http://localhost:3000/api {home}/workspace/project/agent-dev-center/scripts/poll-tasks.sh

# 每小时的第15分钟 - 前端工程师
# 15 * * * * AGENT_TYPE=frontend-engineer TOKEN=your-token-here API_BASE=http://localhost:3000/api {home}/workspace/project/agent-dev-center/scripts/poll-tasks.sh

# 每小时的第30分钟 - 移动端工程师
# 30 * * * * AGENT_TYPE=mobile-app-engineer TOKEN=your-token-here API_BASE=http://localhost:3000/api {home}/workspace/project/agent-dev-center/scripts/poll-tasks.sh

# 每小时的第45分钟 - 小程序工程师
# 45 * * * * AGENT_TYPE=miniapp-game-engineer TOKEN=your-token-here API_BASE=http://localhost:3000/api {home}/workspace/project/agent-dev-center/scripts/poll-tasks.sh

# 每小时的第50分钟 - 游戏开发师
